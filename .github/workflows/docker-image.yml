name: Docker Image CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

env:
  DOCKER_REPO: trucksnl/gcloud-kubectl-helm
  GHCR_REPO: ghcr.io/trucksnl/gcloud-kubectl-helm

jobs:
  build:
    runs-on: ${{ startsWith(matrix.platform, 'arm') && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - amd64
          - arm64
    steps:    
    - name: Git checkout
      uses: actions/checkout@v4
    
    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.DOCKER_REPO }}
          ${{ env.GHCR_REPO }}
    
    - name: Login to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Login to GHCR
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push by digest to Docker Hub
      id: build-dockerhub
      uses: docker/build-push-action@v6
      with:
        platforms: linux/${{ matrix.platform }}
        labels: ${{ steps.meta.outputs.labels }}
        tags: ${{ env.DOCKER_REPO }}
        outputs: type=image,push-by-digest=true,name-canonical=true,push=true

    - name: Build and push by digest to GHCR
      id: build-ghcr
      uses: docker/build-push-action@v6
      with:
        platforms: linux/${{ matrix.platform }}
        labels: ${{ steps.meta.outputs.labels }}
        tags: ${{ env.GHCR_REPO }}
        outputs: type=image,push-by-digest=true,name-canonical=true,push=true

    - name: Export digests
      run: |
        mkdir -p ${{ runner.temp }}/digests/dockerhub
        mkdir -p ${{ runner.temp }}/digests/ghcr
        dockerhub_digest="${{ steps.build-dockerhub.outputs.digest }}"
        ghcr_digest="${{ steps.build-ghcr.outputs.digest }}"
        touch "${{ runner.temp }}/digests/dockerhub/${dockerhub_digest#sha256:}"
        touch "${{ runner.temp }}/digests/ghcr/${ghcr_digest#sha256:}"

    - name: Upload Docker Hub digest
      uses: actions/upload-artifact@v4
      with:
        name: digests-dockerhub-${{ matrix.platform }}
        path: ${{ runner.temp }}/digests/dockerhub/*
        if-no-files-found: error
        retention-days: 1

    - name: Upload GHCR digest
      uses: actions/upload-artifact@v4
      with:
        name: digests-ghcr-${{ matrix.platform }}
        path: ${{ runner.temp }}/digests/ghcr/*
        if-no-files-found: error
        retention-days: 1

  merge:
    runs-on: ubuntu-24.04-arm
    needs:
      - build
    steps:
      - name: Download Docker Hub digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests/dockerhub
          pattern: digests-dockerhub-*
          merge-multiple: true

      - name: Download GHCR digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests/ghcr
          pattern: digests-ghcr-*
          merge-multiple: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKER_REPO }}
            ${{ env.GHCR_REPO }}
          tags: |
            latest
            ${{ github.run_number }}

      - name: Create manifest list and push to Docker Hub
        working-directory: ${{ runner.temp }}/digests/dockerhub
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map(select(startswith("ghcr.io/") | not)) | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.DOCKER_REPO }}@sha256:%s ' *)

      - name: Create manifest list and push to GHCR
        working-directory: ${{ runner.temp }}/digests/ghcr
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map(select(startswith("ghcr.io/"))) | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.GHCR_REPO }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.DOCKER_REPO }}:${{ github.run_number }}
          docker buildx imagetools inspect ${{ env.GHCR_REPO }}:${{ github.run_number }}
